name: Build Binaries

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi
          
          # Build target binary
          go build -v -o dist/trmg-${{ matrix.goos }}-${{ matrix.goarch }}$EXT

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: trmg-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/trmg-${{ matrix.goos }}-${{ matrix.goarch }}*

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/trmg-${{ matrix.goos }}-${{ matrix.goarch }}*
